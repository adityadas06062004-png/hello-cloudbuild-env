<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Daily Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Personal Assistant</h1>
            <button id="theme-toggle">Toggle Theme</button>
        </header>
        <main class="main-content">
            <section class="tasks-section">
                <h2>Today's Tasks</h2>
                <ul id="task-list">
                    <!-- Tasks will be dynamically added here -->
                </ul>
                <input type="text" id="task-input" placeholder="Add a new task...">
                <button id="add-task-btn">Add Task</button>
            </section>
            <section class="reminders-section">
                <h2>Upcoming Reminders</h2>
                <ul id="reminder-list">
                    <!-- Reminders will be dynamically added here -->
                </ul>
                <input type="text" id="reminder-input" placeholder="Add a new reminder...">
                <select id="reminder-priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="urgent">Urgent</option>
                </select>
                <button id="add-reminder-btn">Add Reminder</button>

            </section>
            <section class="decision-section">
                <h2>Decision Helper</h2>
                <div id="decision-helper">
                    <input type="text" id="dilemma-input" placeholder="Enter your dilemma...">
                    <div class="pros-cons-container">
                        <textarea id="pros-input" placeholder="Pros..."></textarea>
                        <textarea id="cons-input" placeholder="Cons..."></textarea>
                    </div>
                    <button id="analyze-decision-btn">Analyze</button>
                    <button id="clear-decision-btn">Clear</button>
                    <div id="decision-result"></div>
                </div>
            </section>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
